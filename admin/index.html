<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELB Creative — Admin</title>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@2.10.192/dist/decap-cms.js"></script>
</head>
<body>
<script>
CMS.init({
  config: {
    backend: {
      name: 'github',
      repo: 'TechElbCreative/elbcreative-site',
      branch: 'main',
      base_url: 'https://elbcreative.co',
      auth_endpoint: '/auth'
    },
    media_folder: 'images',
    public_folder: '/images',
    collections: [
      {
        name: 'content',
        label: 'Site Content',
        files: [
          {
            name: 'main_content',
            label: 'Main Content',
            file: '_data/content.json',
            format: 'json',
            fields: [
              { label: 'Hero Section', name: 'hero', widget: 'object', fields: [
                { label: 'Headline', name: 'headline', widget: 'string' },
                { label: 'Description', name: 'description', widget: 'text' },
                { label: 'Location 1', name: 'location1', widget: 'string' },
                { label: 'Location 2', name: 'location2', widget: 'string' }
              ]},
              { label: 'About Section', name: 'about', widget: 'object', fields: [
                { label: 'About Text', name: 'text', widget: 'text' },
                { label: 'Pull Quote', name: 'quote', widget: 'string' }
              ]},
              { label: 'Contact Info', name: 'contact', widget: 'object', fields: [
                { label: 'Inquiry Email', name: 'email', widget: 'string' },
                { label: 'Instagram Handle', name: 'instagram', widget: 'string' }
              ]}
            ]
          }
        ]
      },
      {
        name: 'theme',
        label: 'Theme & Branding',
        files: [
          {
            name: 'theme_settings',
            label: 'Theme Settings',
            file: '_data/settings.json',
            format: 'json',
            fields: [
              { label: 'Primary Color', name: 'primaryColor', widget: 'color' },
              { label: 'Secondary Color', name: 'secondaryColor', widget: 'color' },
              { label: 'Accent Color', name: 'accentColor', widget: 'color' },
              { label: 'Hero Title', name: 'heroTitle', widget: 'string' },
              { label: 'Hero Subtitle', name: 'heroSubtitle', widget: 'string' },
              { label: 'Instagram URL', name: 'instagramUrl', widget: 'string' },
              { label: 'LinkedIn URL', name: 'linkedinUrl', widget: 'string' },
              { label: 'Contact Email', name: 'contactEmail', widget: 'string' },
              { label: 'Calendly Link', name: 'calendlyLink', widget: 'string' },
              { label: 'CTA Text', name: 'ctaText', widget: 'string' },
              { label: 'Notification Bar Text', name: 'notificationText', widget: 'string' }
            ]
          }
        ]
      }
    ]
  }
});
</script>
</body>
</html>
