<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELB Creative — Admin</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
<script>
CMS.init({
  config: {
    backend: {
      name: 'github',
      repo: 'TechElbCreative/elbcreative-site',
      branch: 'main',
      base_url: 'https://elbcreative.co',
      auth_endpoint: '/auth'
    },
    media_folder: 'images',
    public_folder: '/images',
    collections: [{
      name: 'content',
      label: 'Site Content',
      files: [{
        name: 'main',
        label: 'Main Content',
        file: '_data/content.json',
        format: 'json',
        fields: [
          { label: 'Hero Section', name: 'hero', widget: 'object', fields: [
            { label: 'Headline', name: 'headline', widget: 'string' },
            { label: 'Description', name: 'description', widget: 'text' },
            { label: 'Location 1', name: 'location1', widget: 'string' },
            { label: 'Location 2', name: 'location2', widget: 'string' }
          ]},
          { label: 'About Section', name: 'about', widget: 'object', fields: [
            { label: 'About Text', name: 'text', widget: 'text' },
            { label: 'Pull Quote', name: 'quote', widget: 'string' }
          ]},
          { label: 'Contact Info', name: 'contact', widget: 'object', fields: [
            { label: 'Inquiry Email', name: 'email', widget: 'string' },
            { label: 'Instagram Handle', name: 'instagram', widget: 'string' }
          ]},
          { label: 'Packages', name: 'packages', widget: 'object', fields: [
            { label: 'Starter Package', name: 'starter', widget: 'object', fields: [
              { label: 'Price', name: 'price', widget: 'string' },
              { label: 'Features', name: 'features', widget: 'list', field: { label: 'Feature', name: 'item', widget: 'string' } }
            ]},
            { label: 'Growth Package', name: 'growth', widget: 'object', fields: [
              { label: 'Price', name: 'price', widget: 'string' },
              { label: 'Features', name: 'features', widget: 'list', field: { label: 'Feature', name: 'item', widget: 'string' } }
            ]},
            { label: 'Full Service Package', name: 'full', widget: 'object', fields: [
              { label: 'Price', name: 'price', widget: 'string' },
              { label: 'Features', name: 'features', widget: 'list', field: { label: 'Feature', name: 'item', widget: 'string' } }
            ]}
          ]}
        ]
      }]
    }]
  }
});
</script>
</body>
</html>
