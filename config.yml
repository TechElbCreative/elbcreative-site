backend:
  name: github
  repo: TechElbCreative/elbcreative-site
  branch: main
  base_url: https://elbcreative.co
  auth_endpoint: /auth

media_folder: images
public_folder: /images

collections:
  - name: content
    label: Site Content
    files:
      - name: site_content
        label: Site Content
        file: _data/content.json
        fields:
          - label: Hero Section
            name: hero
            widget: object
            fields:
              - { label: "Italic headline (e.g. 'told beautifully.')", name: headline, widget: string }
              - { label: Description paragraph, name: description, widget: text }
              - { label: Location 1, name: location1, widget: string }
              - { label: Location 2, name: location2, widget: string }
          - label: About Section
            name: about
            widget: object
            fields:
              - { label: About text, name: text, widget: text }
              - { label: Pull quote (no quotes needed), name: quote, widget: string }
          - label: Packages
            name: packages
            widget: object
            fields:
              - label: Starter Package
                name: starter
                widget: object
                fields:
                  - { label: Price (e.g. $300), name: price, widget: string }
                  - { label: Features, name: features, widget: list, field: { label: Feature, name: feature, widget: string } }
              - label: Growth Package
                name: growth
                widget: object
                fields:
                  - { label: Price (e.g. $500), name: price, widget: string }
                  - { label: Features, name: features, widget: list, field: { label: Feature, name: feature, widget: string } }
              - label: Full Service Package
                name: full
                widget: object
                fields:
                  - { label: Price (e.g. $700), name: price, widget: string }
                  - { label: Features, name: features, widget: list, field: { label: Feature, name: feature, widget: string } }
          - label: Contact Info
            name: contact
            widget: object
            fields:
              - { label: Inquiry email, name: email, widget: string }
              - { label: Instagram handle, name: instagram, widget: string }
